name: multi-agent-s2c

services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: multi-agent-s2c-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./volume/minio/data:/data
    networks:
      - s2c-network
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: multi-agent-s2c-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-multi_agent_s2c}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./volume/postgres/data:/var/lib/postgresql/data
    networks:
      - s2c-network
    restart: unless-stopped

  redis:
    build:
      context: .
      dockerfile: api.Dockerfile
      target: redis
    image: multi-agent-s2c-redis:local
    container_name: multi-agent-s2c-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./volume/redis/data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - s2c-network
    restart: unless-stopped

  mongodb:
    image: mongo:8
    container_name: multi-agent-s2c-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-mongo}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-mongo}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-multi_agent_s2c}
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - ./volume/mongodb/data:/data/db
      - ./volume/mongodb/configdb:/data/configdb
    networks:
      - s2c-network
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.6.4
    container_name: multi-agent-s2c-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_METRICS_PORT:-9091}:9091"
    volumes:
      - ./volume/milvus/data:/var/lib/milvus
    networks:
      - s2c-network
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: multi-agent-s2c-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/password}
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - ./volume/neo4j/data:/data
      - ./volume/neo4j/logs:/logs
      - ./volume/neo4j/import:/var/lib/neo4j/import
      - ./volume/neo4j/plugins:/plugins
    networks:
      - s2c-network
    restart: unless-stopped

networks:
  s2c-network:
    driver: bridge
